<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 800 520"
  role="img"
  aria-labelledby="pricingIllustrationTitle pricingIllustrationDesc"
>
  <title id="pricingIllustrationTitle">
    Administrateur IT soulagÈ gr‚ce ‡ l'automatisation MDM
  </title>
  <desc id="pricingIllustrationDesc">
    Illustration humoristique d'un administrateur qui automatise la gestion de plusieurs appareils.
  </desc>

  <defs>
    <filter id="pricingShadowSoft" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B102B" flood-opacity="0.08" />
    </filter>
    <filter id="pricingShadowCard" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B102B" flood-opacity="0.1" />
    </filter>
    <linearGradient id="pricingGradButton" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D4AFF" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="pricingGradScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4F6FA" />
      <stop offset="100%" stop-color="#E8ECF4" />
    </linearGradient>
    <linearGradient id="pricingGradDesk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4F6FA" />
    </linearGradient>
    <marker id="pricingArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563EB" />
    </marker>
  </defs>

  <style>
    @keyframes pricingCoffeeWobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }
    @keyframes pricingCheckFade {
      0%, 20% { opacity: 0; transform: scale(0.6); }
      40%, 100% { opacity: 1; transform: scale(1); }
    }
    @keyframes pricingGearSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pricingSyncPulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    .pricing-animate-coffee {
      animation: pricingCoffeeWobble 4s ease-in-out infinite;
      transform-origin: 498px 392px;
    }
    .pricing-animate-check-1 {
      animation: pricingCheckFade 3s ease-out infinite;
      transform-origin: 598px 198px;
    }
    .pricing-animate-check-2 {
      animation: pricingCheckFade 3s ease-out 0.4s infinite;
      transform-origin: 688px 198px;
    }
    .pricing-animate-check-3 {
      animation: pricingCheckFade 3s ease-out 0.8s infinite;
      transform-origin: 598px 288px;
    }
    .pricing-animate-check-4 {
      animation: pricingCheckFade 3s ease-out 1.2s infinite;
      transform-origin: 688px 288px;
    }
    .pricing-animate-gear {
      animation: pricingGearSpin 12s linear infinite;
      transform-origin: 392px 302px;
    }
    .pricing-animate-sync {
      animation: pricingSyncPulse 2.4s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .pricing-animate-coffee,
      .pricing-animate-check-1,
      .pricing-animate-check-2,
      .pricing-animate-check-3,
      .pricing-animate-check-4,
      .pricing-animate-gear,
      .pricing-animate-sync {
        animation: none !important;
      }
    }
    @media (prefers-color-scheme: dark) {
      .pricing-surface { fill: #1a1f35; stroke: #3d4663; }
      .pricing-surface-light { fill: #252b42; }
      .pricing-text-dark { fill: #E8ECF4; }
      .pricing-text-muted { fill: #9CA3AF; }
      .pricing-floor { fill: #151929; }
    }
  </style>

  <!-- Sol et ambiance -->
  <g id="pricing-scene-floor">
    <ellipse cx="400" cy="468" rx="340" ry="18" fill="#F4F6FA" class="pricing-floor" opacity="0.9" />
    <circle cx="120" cy="80" r="40" fill="#13B8D3" opacity="0.06" />
    <circle cx="700" cy="60" r="50" fill="#6D4AFF" opacity="0.06" />
    <circle cx="640" cy="420" r="30" fill="#2563EB" opacity="0.05" />
  </g>

  <!-- Pile de t‚ches / profils MDM (gauche) -->
  <g id="pricing-mdm-task-pile" filter="url(#pricingShadowCard)">
    <rect x="48" y="300" width="88" height="56" rx="10" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" class="pricing-surface" transform="rotate(-6 92 328)" />
    <rect x="62" y="278" width="88" height="56" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" class="pricing-surface" transform="rotate(-2 106 306)" />
    <rect x="76" y="256" width="88" height="56" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" class="pricing-surface" />
    <!-- Lignes de profils -->
    <line x1="90" y1="272" x2="148" y2="272" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" />
    <line x1="90" y1="284" x2="130" y2="284" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" />
    <line x1="90" y1="296" x2="140" y2="296" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" />
    <!-- Points d'alerte -->
    <circle cx="152" cy="264" r="5" fill="#EF4444" />
    <circle cx="148" cy="286" r="5" fill="#F59E0B" />
    <!-- …tiquette -->
    <rect x="52" y="368" width="108" height="28" rx="8" fill="#0B102B" opacity="0.06" />
    <text x="106" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#515154" class="pricing-text-muted">Profils MDM</text>
    <!-- Points d'interrogation -->
    <text x="168" y="248" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#EF4444" opacity="0.7">?</text>
    <text x="42" y="318" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" opacity="0.6">!</text>
  </g>

  <!-- Bureau et administrateur (centre) -->
  <g id="pricing-admin-workspace" filter="url(#pricingShadowSoft)">
    <!-- Bureau -->
    <rect x="220" y="360" width="300" height="14" rx="4" fill="url(#pricingGradDesk)" stroke="#E8ECF4" stroke-width="1" class="pricing-surface" />
    <rect x="240" y="374" width="8" height="72" rx="2" fill="#D1D5DB" />
    <rect x="492" y="374" width="8" height="72" rx="2" fill="#D1D5DB" />

    <!-- …cran -->
    <rect x="278" y="228" width="184" height="118" rx="10" fill="#0B102B" />
    <rect x="286" y="236" width="168" height="96" rx="6" fill="url(#pricingGradScreen)" class="pricing-surface-light" />
    <!-- Contenu Ècran : lignes de config -->
    <rect x="298" y="252" width="60" height="6" rx="3" fill="#2563EB" opacity="0.5" />
    <rect x="298" y="266" width="100" height="4" rx="2" fill="#94A3B8" opacity="0.4" />
    <rect x="298" y="278" width="80" height="4" rx="2" fill="#94A3B8" opacity="0.4" />
    <rect x="298" y="290" width="90" height="4" rx="2" fill="#94A3B8" opacity="0.4" />
    <!-- Voyant sync sur l'Ècran -->
    <g id="pricing-sync-indicator" class="pricing-animate-sync">
      <circle cx="440" cy="248" r="5" fill="#22C55E" />
      <circle cx="440" cy="248" r="9" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.4" />
    </g>
    <!-- Pied Ècran -->
    <rect x="358" y="346" width="24" height="16" rx="3" fill="#64748B" />
    <rect x="344" y="358" width="52" height="6" rx="3" fill="#94A3B8" />

    <!-- SiËge -->
    <ellipse cx="370" cy="418" rx="36" ry="10" fill="#CBD5E1" opacity="0.5" />
    <rect x="352" y="388" width="36" height="32" rx="8" fill="#2563EB" opacity="0.85" />

    <!-- Personnage (silhouette professionnelle) -->
    <g id="pricing-admin-figure">
      <!-- Corps -->
      <path d="M358 388 Q370 360 382 388" fill="#6D4AFF" />
      <!-- Cou -->
      <rect x="364" y="332" width="12" height="14" rx="4" fill="#FDBA74" />
      <!-- TÍte -->
      <circle cx="370" cy="318" r="22" fill="#FDBA74" />
      <!-- Cheveux -->
      <path d="M350 312 Q370 292 390 312 Q388 302 370 298 Q352 302 350 312" fill="#0B102B" />
      <!-- Expression soulagÈe : yeux fermÈs -->
      <path d="M360 318 Q364 322 368 318" fill="none" stroke="#0B102B" stroke-width="2" stroke-linecap="round" />
      <path d="M372 318 Q376 322 380 318" fill="none" stroke="#0B102B" stroke-width="2" stroke-linecap="round" />
      <!-- Sourire -->
      <path d="M362 328 Q370 336 378 328" fill="none" stroke="#0B102B" stroke-width="2" stroke-linecap="round" />
      <!-- Bras vers souris -->
      <path d="M352 378 Q330 370 318 356" fill="none" stroke="#6D4AFF" stroke-width="10" stroke-linecap="round" />
      <!-- Bras vers bouton -->
      <path d="M388 378 Q410 340 418 310" fill="none" stroke="#6D4AFF" stroke-width="10" stroke-linecap="round" />
    </g>

    <!-- Souris -->
    <rect x="308" y="352" width="22" height="14" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" class="pricing-surface" />

    <!-- Bouton automatisation -->
    <g id="pricing-automation-button">
      <rect x="408" y="278" width="72" height="72" rx="18" fill="url(#pricingGradButton)" filter="url(#pricingShadowCard)" />
      <text x="444" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">AUTO</text>
      <text x="444" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" opacity="0.85">MDM</text>
    </g>

    <!-- Roue dentÈe dÈcorative -->
    <g id="pricing-gear" class="pricing-animate-gear">
      <circle cx="392" cy="302" r="14" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.7" />
      <circle cx="392" cy="302" r="5" fill="#FFFFFF" opacity="0.7" />
      <rect x="389" y="284" width="6" height="8" rx="1" fill="#FFFFFF" opacity="0.7" />
      <rect x="389" y="312" width="6" height="8" rx="1" fill="#FFFFFF" opacity="0.7" />
      <rect x="374" y="299" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.7" />
      <rect x="402" y="299" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.7" />
    </g>
  </g>

  <!-- Appareils validÈs (droite) -->
  <g id="pricing-devices-validated">
    <!-- Mac (portable) -->
    <g id="pricing-device-mac">
      <rect x="568" y="168" width="72" height="48" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" class="pricing-surface" filter="url(#pricingShadowCard)" />
      <rect x="576" y="176" width="56" height="32" rx="3" fill="#F4F6FA" class="pricing-surface-light" />
      <path d="M584 224 H624" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
      <g class="pricing-animate-check-1">
        <circle cx="628" cy="172" r="10" fill="#22C55E" />
        <path d="M623 172 L627 176 L634 168" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
    <!-- iPhone -->
    <g id="pricing-device-iphone">
      <rect x="658" y="158" width="36" height="64" rx="8" fill="#FFFFFF" stroke="#6D4AFF" stroke-width="1.5" class="pricing-surface" filter="url(#pricingShadowCard)" />
      <rect x="664" y="168" width="24" height="44" rx="2" fill="#F4F6FA" class="pricing-surface-light" />
      <circle cx="676" cy="218" r="3" fill="#CBD5E1" />
      <g class="pricing-animate-check-2">
        <circle cx="698" cy="162" r="10" fill="#22C55E" />
        <path d="M693 162 L697 166 L704 158" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
    <!-- iPad -->
    <g id="pricing-device-ipad">
      <rect x="568" y="258" width="56" height="72" rx="8" fill="#FFFFFF" stroke="#13B8D3" stroke-width="1.5" class="pricing-surface" filter="url(#pricingShadowCard)" />
      <rect x="574" y="266" width="44" height="56" rx="3" fill="#F4F6FA" class="pricing-surface-light" />
      <g class="pricing-animate-check-3">
        <circle cx="628" cy="262" r="10" fill="#22C55E" />
        <path d="M623 262 L627 266 L634 258" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
    <!-- PC (tour + Ècran) -->
    <g id="pricing-device-pc">
      <rect x="648" y="268" width="28" height="56" rx="4" fill="#FFFFFF" stroke="#0B102B" stroke-width="1.5" class="pricing-surface" filter="url(#pricingShadowCard)" />
      <circle cx="662" cy="310" r="4" fill="#13B8D3" class="pricing-animate-sync" />
      <rect x="682" y="258" width="52" height="40" rx="4" fill="#FFFFFF" stroke="#0B102B" stroke-width="1.5" class="pricing-surface" />
      <rect x="688" y="264" width="40" height="28" rx="2" fill="#F4F6FA" class="pricing-surface-light" />
      <rect x="698" y="298" width="20" height="8" rx="2" fill="#94A3B8" />
      <g class="pricing-animate-check-4">
        <circle cx="738" cy="262" r="10" fill="#22C55E" />
        <path d="M733 262 L737 266 L744 258" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
    <!-- …tiquette -->
    <rect x="580" y="348" width="120" height="28" rx="8" fill="#22C55E" opacity="0.1" />
    <text x="640" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16A34A">Conformes</text>
  </g>

  <!-- Tasse de cafÈ -->
  <g id="pricing-coffee-cup" class="pricing-animate-coffee">
    <rect x="486" y="372" width="24" height="28" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" class="pricing-surface" filter="url(#pricingShadowCard)" />
    <path d="M510 380 Q520 380 520 388 Q520 396 510 396" fill="none" stroke="#F59E0B" stroke-width="2" />
    <path d="M492 368 Q494 358 498 352" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <path d="M498 366 Q500 354 504 348" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.35" />
    <ellipse cx="498" cy="374" rx="8" ry="3" fill="#78350F" opacity="0.35" />
  </g>

  <!-- Bulle dÈcorative -->
  <g id="pricing-speech-bubble">
    <rect x="302" y="168" width="88" height="36" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" filter="url(#pricingShadowCard)" class="pricing-surface" />
    <path d="M340 204 L336 218 L352 204" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" stroke-linejoin="round" class="pricing-surface" />
    <text x="346" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2563EB" class="pricing-text-dark">Enfin !</text>
  </g>

  <!-- FlËche de flux (gauche í centre í droite) -->
  <g id="pricing-flow-arrows" opacity="0.35">
    <path d="M178 310 H240" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#pricingArrow)" />
    <path d="M488 310 H556" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="6 4" />
    <polygon points="556,306 564,310 556,314" fill="#22C55E" />
  </g>
</svg>
