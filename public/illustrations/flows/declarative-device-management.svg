<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title">
  <title id="title">Boucle Declarative Device Management</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="640" height="220" fill="#ffffff"/>
  
    <g>
    <rect class="boxAccent" x="40" y="70" width="160" height="80"/>
    <text class="title" x="120" y="106" text-anchor="middle">Déclarations</text>
    <text class="sub" x="120" y="122" text-anchor="middle">État souhaité</text>
  </g>
    <path class="arrow" d="M220 110 H280"/>
    <g>
    <rect class="box" x="290" y="70" width="160" height="80"/>
    <text class="title" x="370" y="106" text-anchor="middle">Appareil</text>
    <text class="sub" x="370" y="122" text-anchor="middle">Applique + rapporte</text>
  </g>
    <path class="arrow" d="M470 110 H530"/>
    <g>
    <rect class="box" x="540" y="70" width="80" height="80"/>
    <text class="title" x="580" y="106" text-anchor="middle">MDM</text>
    <text class="sub" x="580" y="122" text-anchor="middle">Statut</text>
  </g>
    <path class="arrow" d="M580 70 C580 30 80 30 80 70"/>
    <text class="label" x="320" y="28" text-anchor="middle">Declarative Device Management</text>
  
</svg>