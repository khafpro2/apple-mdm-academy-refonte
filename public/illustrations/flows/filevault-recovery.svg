<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="title">
  <title id="title">FileVault et clés de récupération</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="640" height="200" fill="#ffffff"/>
  
    <g>
    <rect class="boxAccent" x="40" y="60" width="160" height="80"/>
    <text class="title" x="120" y="96" text-anchor="middle">Disque Mac</text>
    <text class="sub" x="120" y="112" text-anchor="middle">Chiffré FileVault</text>
  </g>
    <path class="arrow" d="M220 100 H280"/>
    <g>
    <rect class="box" x="290" y="30" width="150" height="60"/>
    <text class="title" x="365" y="56" text-anchor="middle">Clé utilisateur</text>
    <text class="sub" x="365" y="72" text-anchor="middle">Login</text>
  </g>
    <g>
    <rect class="box" x="290" y="110" width="150" height="60"/>
    <text class="title" x="365" y="136" text-anchor="middle">Clé institution</text>
    <text class="sub" x="365" y="152" text-anchor="middle">Escrow MDM</text>
  </g>
    <path class="arrow" d="M450 60 H510"/>
    <path class="arrow" d="M450 140 H510"/>
    <g>
    <rect class="box" x="520" y="60" width="100" height="80"/>
    <text class="title" x="570" y="96" text-anchor="middle">Recovery</text>
    <text class="sub" x="570" y="112" text-anchor="middle">Déverrouillage</text>
  </g>
  
</svg>