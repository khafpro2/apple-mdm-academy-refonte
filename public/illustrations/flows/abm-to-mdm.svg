<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title">
  <title id="title">Flux ABM vers MDM vers appareil</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="720" height="180" fill="#ffffff"/>
  
    <g>
    <rect class="boxAccent" x="40" y="50" width="160" height="80"/>
    <text class="title" x="120" y="86" text-anchor="middle">Apple Business Manager</text>
    <text class="sub" x="120" y="102" text-anchor="middle">Organisation</text>
  </g>
    <path class="arrow" d="M210 90 H270"/>
    <g>
    <rect class="box" x="280" y="50" width="160" height="80"/>
    <text class="title" x="360" y="86" text-anchor="middle">Serveur MDM</text>
    <text class="sub" x="360" y="102" text-anchor="middle">Jamf / Intune</text>
  </g>
    <path class="arrow" d="M450 90 H510"/>
    <g>
    <rect class="box" x="520" y="50" width="160" height="80"/>
    <text class="title" x="600" y="86" text-anchor="middle">Appareil Apple</text>
    <text class="sub" x="600" y="102" text-anchor="middle">macOS · iOS · iPadOS</text>
  </g>
  
</svg>