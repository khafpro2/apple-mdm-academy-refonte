<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="title">
  <title id="title">Boucle de conformité</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="640" height="200" fill="#ffffff"/>
  
    <g>
    <rect class="box" x="40" y="60" width="140" height="80"/>
    <text class="title" x="110" y="96" text-anchor="middle">Appareil</text>
    <text class="sub" x="110" y="112" text-anchor="middle">État</text>
  </g>
    <path class="arrow" d="M190 100 H240"/>
    <g>
    <rect class="boxAccent" x="250" y="60" width="140" height="80"/>
    <text class="title" x="320" y="96" text-anchor="middle">MDM</text>
    <text class="sub" x="320" y="112" text-anchor="middle">Évalue</text>
  </g>
    <path class="arrow" d="M400 100 H450"/>
    <g>
    <rect class="box" x="460" y="60" width="150" height="80"/>
    <text class="title" x="535" y="96" text-anchor="middle">Accès</text>
    <text class="sub" x="535" y="112" text-anchor="middle">Conformité / CA</text>
  </g>
    <path class="arrow" d="M535 60 C535 20 110 20 110 60"/>
  
</svg>