<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title">
  <title id="title">Comparaison des types d’enrôlement</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="720" height="220" fill="#ffffff"/>
  
    <text class="title" x="360" y="28" text-anchor="middle">Types d'enrôlement Apple</text>
    <g>
    <rect class="boxAccent" x="30" y="55" width="200" height="130"/>
    <text class="title" x="130" y="116" text-anchor="middle">Automated Device Enrollment</text>
    <text class="sub" x="130" y="132" text-anchor="middle">Supervision · zero-touch</text>
  </g>
    <g>
    <rect class="box" x="260" y="55" width="200" height="130"/>
    <text class="title" x="360" y="116" text-anchor="middle">Device Enrollment</text>
    <text class="sub" x="360" y="132" text-anchor="middle">Organisation · profil</text>
  </g>
    <g>
    <rect class="box" x="490" y="55" width="200" height="130"/>
    <text class="title" x="590" y="116" text-anchor="middle">User Enrollment</text>
    <text class="sub" x="590" y="132" text-anchor="middle">BYOD · données séparées</text>
  </g>
  
</svg>