<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title">
  <title id="title">Cycle de mise à jour géré</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
  .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
  .boxAccent{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;rx:10}
  .title{font:600 13px system-ui,sans-serif;fill:#0f172a}
  .sub{font:500 11px system-ui,sans-serif;fill:#64748b}
  .arrow{stroke:#64748b;stroke-width:1.75;fill:none;marker-end:url(#arrow)}
  .label{font:500 10px system-ui,sans-serif;fill:#475569}
</style>
  <rect width="720" height="180" fill="#ffffff"/>
  
    <g>
    <rect class="box" x="30" y="50" width="140" height="80"/>
    <text class="title" x="100" y="86" text-anchor="middle">Catalogue</text>
    <text class="sub" x="100" y="102" text-anchor="middle">Apple Software</text>
  </g>
    <path class="arrow" d="M180 90 H230"/>
    <g>
    <rect class="boxAccent" x="240" y="50" width="150" height="80"/>
    <text class="title" x="315" y="86" text-anchor="middle">Politique MDM</text>
    <text class="sub" x="315" y="102" text-anchor="middle">Defer / enforce</text>
  </g>
    <path class="arrow" d="M400 90 H450"/>
    <g>
    <rect class="box" x="460" y="50" width="110" height="80"/>
    <text class="title" x="515" y="86" text-anchor="middle">Flotte</text>
    <text class="sub" x="515" y="102" text-anchor="middle">macOS</text>
  </g>
    <g>
    <rect class="box" x="590" y="50" width="110" height="80"/>
    <text class="title" x="645" y="86" text-anchor="middle">Flotte</text>
    <text class="sub" x="645" y="102" text-anchor="middle">iOS / iPadOS</text>
  </g>
  
</svg>